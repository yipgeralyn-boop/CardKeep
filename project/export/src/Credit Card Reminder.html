<head>

<template id="__bundler_thumbnail" data-bg-color="#E9E5DC">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#E9E5DC"/>
    <!-- credit card -->
    <rect x="360" y="300" width="480" height="300" rx="36" fill="#5B4FD6"/>
    <rect x="404" y="356" width="80" height="58" rx="10" fill="#F4D88A"/>
    <rect x="404" y="496" width="300" height="22" rx="11" fill="#FFFFFF" opacity="0.7"/>
    <rect x="404" y="534" width="180" height="18" rx="9" fill="#FFFFFF" opacity="0.45"/>
    <!-- sprout mascot -->
    <g transform="translate(740,250)">
      <rect x="92" y="40" width="14" height="44" rx="7" fill="#2E9E6B"/>
      <path d="M99 64 C95 32, 71 16, 43 16 C51 44, 71 64, 99 68 Z" fill="#2E9E6B"/>
      <path d="M99 64 C103 36, 127 20, 155 22 C145 48, 125 64, 99 68 Z" fill="#2E9E6B" opacity="0.88"/>
      <ellipse cx="99" cy="150" rx="92" ry="88" fill="#5B4FD6"/>
      <ellipse cx="99" cy="164" rx="60" ry="62" fill="#FFF8EC"/>
      <circle cx="76" cy="150" r="9" fill="#2A2620"/>
      <circle cx="122" cy="150" r="9" fill="#2A2620"/>
      <path d="M82 178 q17 15 34 0" stroke="#2A2620" stroke-width="7" fill="none" stroke-linecap="round"/>
    </g>
  </svg>
</template>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #E9E5DC;
    font-family: 'Figtree', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100vh; }
  input::placeholder { color: rgba(150,145,135,0.6); }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pop { 0% { transform: scale(0.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes mascotBounce { 0% { transform: translateY(14px) scale(0.7); } 55% { transform: translateY(-10px) scale(1.06); } 100% { transform: translateY(0) scale(1); } }
  @keyframes mascotIdle { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-4px) rotate(-1.5deg); } }
  @keyframes mascotSprout { 0% { transform: scaleY(0.2) translateY(10px); } 100% { transform: scaleY(1) translateY(0); } }
  @keyframes sparklePop { 0% { transform: scale(0); opacity: 0; } 45% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 0.95; } }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="mascot.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="detail.jsx"></script>
<script type="text/babel" src="reminders.jsx"></script>
<script type="text/babel" src="payoff.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
